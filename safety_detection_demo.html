<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>퇴근하지 못한 사람들 — AI 건설현장 위험 감지 데모</title>
<style>
  html, body { margin: 0; padding: 0; }
  #root { min-height: 100vh; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect, Fragment } = React;



// ─────────────────────────────────────────────────────────────
//  「퇴근하지 못한 사람들」 — AI 건설현장 위험 감지 데모 (POC 옵션 A) v2
//  감지(Sensing) → 판단(Reasoning) → 경보(Alerting) → 학습(Learning)
//  v2 수정사항:
//   1) 업로드 이미지를 캔버스로 자동 리사이즈 + JPEG 변환 (대용량 사진 오류 해결)
//   2) JSON 파싱 견고화 ( { ... } 구간만 추출 후 파싱)
//   3) API 오류 메시지를 화면에 구체적으로 표시
// ─────────────────────────────────────────────────────────────

const LANGS = {
  ko: { label: "한국어", name: "Korean" },
  vi: { label: "Tiếng Việt", name: "Vietnamese" },
  th: { label: "ภาษาไทย", name: "Thai" },
  zh: { label: "中文", name: "Chinese" },
  en: { label: "English", name: "English" },
};

const SEVERITY = {
  high: { ko: "위험", color: "#e5484d", bg: "rgba(229,72,77,0.14)" },
  medium: { ko: "주의", color: "#f5a623", bg: "rgba(245,166,35,0.14)" },
  low: { ko: "양호", color: "#46a758", bg: "rgba(70,167,88,0.14)" },
};

const SPEECH_LANG = { ko: "ko-KR", vi: "vi-VN", th: "th-TH", zh: "zh-CN", en: "en-US" };

const MAX_DIM = 1280; // 긴 변 최대 픽셀 — 이보다 크면 축소

function App() {
  const [imageData, setImageData] = useState(null);   // 리사이즈된 JPEG base64 (prefix 제거)
  const [imageUrl, setImageUrl] = useState(null);      // 화면 표시용
  const [analyzing, setAnalyzing] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [lang, setLang] = useState("vi");
  const [log, setLog] = useState([]);
  const [dragging, setDragging] = useState(false);
  const [imgInfo, setImgInfo] = useState(null);        // 리사이즈 정보 안내
  const fileRef = useRef(null);
  const imgRef = useRef(null);
  const [imgDims, setImgDims] = useState({ w: 0, h: 0 });

  // ── 핵심 수정: 캔버스로 리사이즈 + JPEG 변환 ──
  function processFile(file) {
    if (!file) return;
    setError(null);
    setResult(null);
    setImgInfo(null);

    if (!file.type.startsWith("image/")) {
      setError("이미지 파일만 업로드할 수 있습니다 (JPG, PNG 등).");
      return;
    }

    const reader = new FileReader();
    reader.onerror = () => setError("파일을 읽지 못했습니다. 다른 파일로 시도해 주세요.");
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => setError("이미지를 불러오지 못했습니다. 손상되었거나 지원하지 않는 형식일 수 있습니다.");
      img.onload = () => {
        const { width, height } = img;
        let w = width, h = height;
        if (Math.max(w, h) > MAX_DIM) {
          const scale = MAX_DIM / Math.max(w, h);
          w = Math.round(w * scale);
          h = Math.round(h * scale);
        }
        const canvas = document.createElement("canvas");
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext("2d");
        // 투명 PNG가 검게 나오지 않도록 흰 배경 채우기
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);

        // 항상 JPEG로 통일 (media_type 불일치 문제 제거)
        const jpegUrl = canvas.toDataURL("image/jpeg", 0.85);
        setImageUrl(jpegUrl);
        setImageData(jpegUrl.split(",")[1]);

        if (Math.max(width, height) > MAX_DIM) {
          setImgInfo(`원본 ${width}×${height} → ${w}×${h} 로 자동 축소했습니다.`);
        }
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  }

  function onDrop(e) {
    e.preventDefault();
    setDragging(false);
    processFile(e.dataTransfer.files?.[0]);
  }

  // ── 견고한 JSON 추출 + 흔한 오류 자동 정리 ──
  function extractJson(text) {
    let t = text.replace(/```json/gi, "").replace(/```/g, "").trim();

    // 응답에서 { ... } 구간만 추출
    const start = t.indexOf("{");
    const end = t.lastIndexOf("}");
    if (start !== -1 && end !== -1 && end > start) {
      t = t.slice(start, end + 1);
    }

    // 1차 시도: 원본 그대로
    try {
      return JSON.parse(t);
    } catch (_) {
      // 흔한 오류 자동 정리 후 2차 시도
      let fixed = t
        // 객체/배열 마지막 요소 뒤의 trailing comma 제거: ",}" → "}", ",]" → "]"
        .replace(/,(\s*[}\]])/g, "$1")
        // 숫자 범위 표기 실수 정리: "x": 0.3-0.5 → "x": 0.3 (앞 값만 사용)
        .replace(/:\s*(-?\d+(?:\.\d+)?)\s*-\s*-?\d+(?:\.\d+)?/g, ": $1")
        // 스마트 따옴표를 표준 따옴표로
        .replace(/[\u201C\u201D]/g, '"')
        .replace(/[\u2018\u2019]/g, "'");
      return JSON.parse(fixed);
    }
  }

  async function analyze() {
    if (!imageData) {
      setError("먼저 현장 사진을 업로드해 주세요.");
      return;
    }
    setAnalyzing(true);
    setError(null);
    setResult(null);

    const targetLang = LANGS[lang].name;
    const prompt = `You are an AI construction-site safety inspector for a Korean accident-prevention system. Analyze the construction site image for safety hazards.

Focus on: missing hard hats (안전모), missing safety harnesses / fall protection (안전벨트), missing safety boots (안전화), fall-from-height risk, dangerous postures, proximity to heavy machinery, unstable scaffolding, and other visible hazards.

Respond with ONLY a valid JSON object (no markdown, no backticks, no preamble) in this exact schema:
{
  "riskScore": <integer 0-100, higher = more dangerous>,
  "summary_ko": "<one-sentence overall assessment in Korean>",
  "hazards": [
    {
      "label_ko": "<hazard name in Korean>",
      "severity": "high" | "medium" | "low",
      "detail_ko": "<short explanation in Korean>",
      "box": { "x": <0-1 left>, "y": <0-1 top>, "w": <0-1 width>, "h": <0-1 height> }
    }
  ],
  "voiceAlert": "<the most urgent single safety warning, written in ${targetLang}, as if spoken to the worker through a smart helmet>"
}
The "box" coordinates are normalized fractions of image width/height. Each of x, y, w, h MUST be a single decimal number (e.g. 0.42), never a range. If you cannot localize a hazard, estimate its position. Always return at least the riskScore, summary_ko and voiceAlert even if no hazards are found (use an empty hazards array).

CRITICAL: Output strictly valid JSON only. No trailing commas. No comments. No text before or after the JSON object. Use double quotes for all keys and string values.`;

    try {
      // 파싱 실패는 재시도로 대부분 해결되므로 최대 2회 시도
      let parsed = null;
      let lastErr = null;
      for (let attempt = 0; attempt < 2; attempt++) {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            messages: [
              {
                role: "user",
                content: [
                  { type: "image", source: { type: "base64", media_type: "image/jpeg", data: imageData } },
                  { type: "text", text: prompt },
                ],
              },
            ],
          }),
        });

        // HTTP 오류는 재시도해도 동일하므로 즉시 중단
        if (!response.ok) {
          let detail = "";
          try {
            const errBody = await response.json();
            detail = errBody?.error?.message || JSON.stringify(errBody);
          } catch (_) {
            detail = await response.text();
          }
          throw new Error(`API 오류 (${response.status}): ${detail}`);
        }

        const data = await response.json();
        const text = (data.content || [])
          .filter((b) => b.type === "text")
          .map((b) => b.text)
          .join("\n");

        if (!text) {
          lastErr = new Error("응답이 비어 있습니다.");
          continue;
        }

        try {
          parsed = extractJson(text);
          break; // 파싱 성공 → 루프 종료
        } catch (e) {
          lastErr = e; // 파싱 실패 → 다음 시도
        }
      }

      if (!parsed) {
        throw new Error(
          "AI 응답을 해석하지 못했습니다 (형식 오류). 한 번 더 '위험 분석 실행'을 눌러 주세요."
        );
      }

      setResult(parsed);

      const entry = {
        time: new Date().toLocaleTimeString("ko-KR"),
        score: parsed.riskScore,
        count: parsed.hazards?.length || 0,
        top: parsed.hazards?.[0]?.label_ko || "특이사항 없음",
      };
      setLog((prev) => [entry, ...prev].slice(0, 8));
    } catch (err) {
      console.error(err);
      setError(err.message || "분석에 실패했습니다. 다시 시도해 주세요.");
    } finally {
      setAnalyzing(false);
    }
  }

  function speakAlert() {
    if (!result?.voiceAlert || !window.speechSynthesis) return;
    const u = new SpeechSynthesisUtterance(result.voiceAlert);
    u.lang = SPEECH_LANG[lang] || "ko-KR";
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  }

  useEffect(() => {
    if (imgRef.current && imageUrl) {
      const el = imgRef.current;
      const update = () => setImgDims({ w: el.clientWidth, h: el.clientHeight });
      if (el.complete) update();
      el.onload = update;
      window.addEventListener("resize", update);
      return () => window.removeEventListener("resize", update);
    }
  }, [imageUrl, result]);

  const scoreColor = (s) =>
    s >= 70 ? "#e5484d" : s >= 40 ? "#f5a623" : "#46a758";

  return (
    <div style={S.root}>
      <style>{CSS}</style>

      <header style={S.header}>
        <div style={S.brandRow}>
          <div style={S.logoMark}>!</div>
          <div>
            <div style={S.kicker}>AI 기반 건설현장 산업재해 예방 시스템 · POC</div>
            <h1 style={S.title}>퇴근하지 못한 사람들</h1>
          </div>
        </div>
        <div style={S.pipeline}>
          {["감지", "판단", "경보", "학습"].map((step, i) => (
            <React.Fragment key={step}>
              <span style={S.pipeStep}>{step}</span>
              {i < 3 && <span style={S.pipeArrow}>→</span>}
            </React.Fragment>
          ))}
        </div>
      </header>

      <div style={S.grid} className="resp-grid">
        <section style={S.leftCol}>
          <div
            style={{ ...S.dropzone, ...(dragging ? S.dropzoneActive : {}) }}
            onClick={() => fileRef.current?.click()}
            onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
            onDragLeave={() => setDragging(false)}
            onDrop={onDrop}
          >
            {imageUrl ? (
              <div style={S.imgWrap}>
                <img ref={imgRef} src={imageUrl} alt="현장" style={S.img} />
                {result?.hazards?.map((h, i) =>
                  h.box ? (
                    <div
                      key={i}
                      style={{
                        position: "absolute",
                        left: h.box.x * imgDims.w,
                        top: h.box.y * imgDims.h,
                        width: h.box.w * imgDims.w,
                        height: h.box.h * imgDims.h,
                        border: `2.5px solid ${SEVERITY[h.severity]?.color || "#e5484d"}`,
                        borderRadius: 4,
                        boxShadow: "0 0 0 9999px rgba(0,0,0,0.02)",
                        pointerEvents: "none",
                      }}
                    >
                      <span style={{
                        position: "absolute", top: -22, left: -2,
                        background: SEVERITY[h.severity]?.color || "#e5484d",
                        color: "#fff", fontSize: 11, fontWeight: 700,
                        padding: "2px 7px", borderRadius: 4, whiteSpace: "nowrap",
                      }}>{h.label_ko}</span>
                    </div>
                  ) : null
                )}
              </div>
            ) : (
              <div style={S.dropEmpty}>
                <div style={S.dropIcon}>＋</div>
                <div style={S.dropTitle}>현장 사진을 업로드하세요</div>
                <div style={S.dropSub}>클릭하거나 이미지를 끌어다 놓으세요 · JPG / PNG</div>
              </div>
            )}
          </div>
          <input
            ref={fileRef}
            type="file"
            accept="image/*"
            style={{ display: "none" }}
            onChange={(e) => processFile(e.target.files?.[0])}
          />

          {imgInfo && <div style={S.info}>{imgInfo}</div>}

          <div style={S.controls}>
            <div style={S.langRow}>
              <span style={S.langLabel}>작업자 언어</span>
              <div style={S.langChips}>
                {Object.entries(LANGS).map(([k, v]) => (
                  <button
                    key={k}
                    onClick={() => setLang(k)}
                    style={{ ...S.langChip, ...(lang === k ? S.langChipActive : {}) }}
                  >{v.label}</button>
                ))}
              </div>
            </div>
            <button
              style={{ ...S.analyzeBtn, ...(analyzing ? S.analyzeBtnBusy : {}) }}
              onClick={analyze}
              disabled={analyzing}
            >
              {analyzing ? "분석 중…" : "위험 분석 실행"}
            </button>
          </div>
          {error && <div style={S.error}>{error}</div>}
        </section>

        <section style={S.rightCol}>
          {!result && !analyzing && (
            <div style={S.placeholder}>
              <p style={S.phLead}>판단 결과가 여기에 표시됩니다.</p>
              <p style={S.phSub}>
                컴퓨터 비전 + 멀티모달 LLM이 현장 사진을 분석해 안전모·안전벨트
                미착용, 추락 위험 자세 등을 감지하고, 작업자의 모국어로 음성 경보를
                생성합니다.
              </p>
            </div>
          )}

          {analyzing && (
            <div style={S.placeholder}>
              <div className="pulse" style={S.pulseRing} />
              <p style={S.phLead}>현장을 판독하는 중…</p>
            </div>
          )}

          {result && (
            <>
              <div style={S.scoreCard}>
                <div>
                  <div style={S.scoreLabel}>종합 위험도 점수</div>
                  <div style={{ ...S.scoreVal, color: scoreColor(result.riskScore) }}>
                    {result.riskScore}<span style={S.scoreMax}>/100</span>
                  </div>
                </div>
                <div style={S.scoreBarWrap}>
                  <div style={{
                    ...S.scoreBar,
                    width: `${result.riskScore}%`,
                    background: scoreColor(result.riskScore),
                  }} />
                </div>
                <p style={S.summary}>{result.summary_ko}</p>
              </div>

              <div style={S.alertCard}>
                <div style={S.alertHead}>
                  <span style={S.alertBadge}>🔊 스마트 안전모 음성 경보</span>
                  <span style={S.alertLang}>{LANGS[lang].label}</span>
                </div>
                <p style={S.alertText}>{result.voiceAlert}</p>
                <button style={S.speakBtn} onClick={speakAlert}>음성으로 재생</button>
              </div>

              <div style={S.hazardSection}>
                <div style={S.sectionTitle}>
                  감지된 위험요소 <span style={S.count}>{result.hazards?.length || 0}건</span>
                </div>
                {result.hazards?.length ? result.hazards.map((h, i) => {
                  const sev = SEVERITY[h.severity] || SEVERITY.medium;
                  return (
                    <div key={i} style={{ ...S.hazardItem, background: sev.bg }}>
                      <span style={{ ...S.sevTag, background: sev.color }}>{sev.ko}</span>
                      <div>
                        <div style={S.hazardLabel}>{h.label_ko}</div>
                        <div style={S.hazardDetail}>{h.detail_ko}</div>
                      </div>
                    </div>
                  );
                }) : (
                  <div style={S.noHazard}>감지된 위험요소가 없습니다.</div>
                )}
              </div>
            </>
          )}
        </section>
      </div>

      <section style={S.logSection}>
        <div style={S.sectionTitle}>
          아차사고 학습 데이터 <span style={S.logHint}>· 모든 감지가 모델 재학습 데이터로 누적됩니다</span>
        </div>
        {log.length ? (
          <div style={S.logTable}>
            <div style={{ ...S.logRow, ...S.logHeader }}>
              <span>시각</span><span>위험도</span><span>감지 건수</span><span>주요 위험</span>
            </div>
            {log.map((e, i) => (
              <div key={i} style={S.logRow}>
                <span style={S.logTime}>{e.time}</span>
                <span style={{ color: scoreColor(e.score), fontWeight: 700 }}>{e.score}</span>
                <span>{e.count}건</span>
                <span>{e.top}</span>
              </div>
            ))}
          </div>
        ) : (
          <div style={S.logEmpty}>아직 누적된 데이터가 없습니다. 분석을 실행해 보세요.</div>
        )}
      </section>

      <footer style={S.footer}>
        국민대학교 · 인공지능과 창의적사고 · POC 데모 &nbsp;|&nbsp; 본 데모의 위험 분석은 Claude Vision으로
        수행되며, 실제 현장 적용 전 검증이 필요합니다.
      </footer>
    </div>
  );
}

const ACCENT = "#ff5a3c";
const INK = "#16140f";
const PAPER = "#f4f1ea";

const S = {
  root: { fontFamily: "'Pretendard', -apple-system, system-ui, sans-serif", background: PAPER, color: INK, minHeight: "100vh", padding: "28px clamp(16px,4vw,48px)", maxWidth: 1180, margin: "0 auto" },
  header: { borderBottom: `2px solid ${INK}`, paddingBottom: 18, marginBottom: 24 },
  brandRow: { display: "flex", alignItems: "center", gap: 14 },
  logoMark: { width: 44, height: 44, borderRadius: 10, background: ACCENT, color: "#fff", fontSize: 26, fontWeight: 900, display: "grid", placeItems: "center", boxShadow: "3px 3px 0 " + INK },
  kicker: { fontSize: 12, fontWeight: 700, letterSpacing: "0.06em", color: "#7a7468", textTransform: "uppercase" },
  title: { fontSize: "clamp(26px,4vw,38px)", fontWeight: 900, margin: "2px 0 0", letterSpacing: "-0.02em" },
  pipeline: { display: "flex", alignItems: "center", gap: 8, marginTop: 16, flexWrap: "wrap" },
  pipeStep: { fontSize: 13, fontWeight: 700, background: "#fff", border: `1.5px solid ${INK}`, borderRadius: 20, padding: "4px 14px" },
  pipeArrow: { color: ACCENT, fontWeight: 900 },
  grid: { display: "grid", gridTemplateColumns: "minmax(0,1.1fr) minmax(0,1fr)", gap: 22, alignItems: "start" },
  leftCol: { display: "flex", flexDirection: "column", gap: 16 },
  dropzone: { border: `2px dashed #c4bdac`, borderRadius: 14, background: "#fff", minHeight: 320, display: "grid", placeItems: "center", cursor: "pointer", overflow: "hidden", transition: "border-color .15s, background .15s" },
  dropzoneActive: { borderColor: ACCENT, background: "rgba(255,90,60,0.04)" },
  dropEmpty: { textAlign: "center", padding: 40 },
  dropIcon: { fontSize: 44, color: "#c4bdac", lineHeight: 1 },
  dropTitle: { fontSize: 17, fontWeight: 800, marginTop: 12 },
  dropSub: { fontSize: 13, color: "#8a8473", marginTop: 6 },
  imgWrap: { position: "relative", width: "100%", lineHeight: 0 },
  img: { width: "100%", display: "block", borderRadius: 12 },
  controls: { display: "flex", flexDirection: "column", gap: 14 },
  langRow: { display: "flex", flexDirection: "column", gap: 8 },
  langLabel: { fontSize: 13, fontWeight: 700, color: "#5a5446" },
  langChips: { display: "flex", gap: 7, flexWrap: "wrap" },
  langChip: { fontSize: 13, fontWeight: 600, padding: "6px 13px", borderRadius: 18, border: `1.5px solid #d8d1c2`, background: "#fff", color: "#5a5446", cursor: "pointer" },
  langChipActive: { background: INK, color: "#fff", borderColor: INK },
